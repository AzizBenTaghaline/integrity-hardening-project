<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SecureLab - Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: monospace; background:#0d1117; color:#e6edf3; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .box { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:2rem; width:380px; }
    .title { text-align:center; font-size:1.4rem; color:#58a6ff; margin-bottom:.3rem; }
    .sub { text-align:center; font-size:.75rem; color:#8b949e; margin-bottom:1.2rem; }
    .warn { background:#3d1f00; border:1px solid #d29922; border-radius:6px; padding:.6rem; font-size:.75rem; color:#d29922; text-align:center; margin-bottom:1.2rem; }
    label { display:block; font-size:.8rem; color:#8b949e; margin-bottom:.3rem; }
    input { width:100%; padding:.55rem .75rem; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#e6edf3; font-family:monospace; font-size:.9rem; margin-bottom:1rem; }
    input:focus { outline:none; border-color:#58a6ff; }
    button { width:100%; padding:.65rem; background:#238636; border:none; border-radius:6px; color:#fff; font-family:monospace; font-size:.9rem; font-weight:bold; cursor:pointer; }
    button:hover { background:#2ea043; }
    .msg { margin-top:1rem; padding:.6rem; border-radius:6px; font-size:.82rem; display:none; }
    .msg.error { background:#3d1515; border:1px solid #f85149; color:#f85149; }
    .msg.success { background:#0d2b0d; border:1px solid #3fb950; color:#3fb950; }
    .hint { margin-top:1rem; font-size:.72rem; color:#8b949e; border-top:1px solid #21262d; padding-top:.8rem; }
    a { color:#58a6ff; }
  </style>
</head>
<body>
<div class="box">
  <div class="title">SecureLab</div>
  <div class="sub">3-Tier Hardening Project</div>
  <div class="warn">Environnement academique de test uniquement</div>
  <form id="f">
   <label>Nom d utilisateur</label>
    <input type="text" id="u" placeholder="admin" autocomplete="off">
    <label>Mot de passe</label>
    <input type="password" id="p" placeholder="mot de passe">
    <button type="submit">Connexion</button>
  </form>
  <div id="msg" class="msg"></div>
  <div class="hint">
    Comptes : admin/admin123 | alice/password<br>
    <a href="admin.html">Panel Admin</a>
  </div>
</div>
<script>
  var API = 'http://192.168.111.135:3000';
  document.getElementById('f').addEventListener('submit', function(e) {
    e.preventDefault();
    var msg = document.getElementById('msg');
    msg.style.display = 'none';
    fetch(API + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.success) {
        sessionStorage.setItem('user', JSON.stringify(d.user));
        msg.className = 'msg success';
        msg.textContent = 'Connecte : ' + d.user.username + ' (' + d.user.role + ')';
        msg.style.display = 'block';
        setTimeout(function() { location.href = 'admin.html'; }, 1000);
      } else {
        msg.className = 'msg error';
        msg.textContent = d.error || d.message || 'Erreur';
        msg.style.display = 'block';
      }
    })
    .catch(function(err) {
      msg.className = 'msg error';
      msg.textContent = 'Erreur reseau : ' + err.message;
      msg.style.display = 'block';
    });
  });
</script>
</body>
</html>
