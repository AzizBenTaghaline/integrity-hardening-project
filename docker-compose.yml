version: "3.8"

services:

  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - web_tier
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend-vulnerable
    container_name: backend_vulnerable
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASS: postgres123
      SESSION_SECRET: secret123
      NODE_ENV: development
    networks:
      - web_tier
      - db_tier
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - db_tier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  web_tier:
    driver: bridge
  db_tier:
    driver: bridge

volumes:
  pgdata:
