version: "3.8"

services:

  frontend:
    image: nginx:alpine
    container_name: frontend_secure
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - web_tier
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend-hardened
    container_name: backend_hardened
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASS: AppUser_SecureP@ss_2024!
      SESSION_SECRET: MonSecretTresLong2024LabProject!
      NODE_ENV: production
      BCRYPT_ROUNDS: "12"
      ALLOWED_ORIGIN: http://192.168.111.135:8080
    networks:
      - web_tier
      - db_tier
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: postgres_db_secure
    expose:
      - "5432"
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: RootDB_SecureP@ss_2024!
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata_secure:/var/lib/postgresql/data
    networks:
      - db_tier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  web_tier:
    driver: bridge
  db_tier:
    driver: bridge
    internal: true

volumes:
  pgdata_secure:
